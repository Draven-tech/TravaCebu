<ion-header>
  <ion-toolbar class="editor-toolbar">
    <ion-title class="editor-title">Edit itinerary</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="saveChanges()" fill="solid" size="small" class="editor-save-btn" aria-label="Save changes">
        <ion-icon name="checkmark-circle" slot="start"></ion-icon>
        Save
      </ion-button>
      <ion-button (click)="cancel()" fill="clear" class="editor-close-btn" aria-label="Close">
        <ion-icon name="close" class="editor-close-icon"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="editor-content ion-padding" [fullscreen]="true">
  <section class="editor-settings-card">
    <h2 class="editor-section-title">Dates &amp; hours</h2>

    <ion-item lines="none" class="editor-field">
      <ion-label position="stacked">Start date</ion-label>
      <ion-input type="date" [(ngModel)]="startDate" (ionChange)="updateAllDates()" class="editor-input">
      </ion-input>
    </ion-item>

    <ion-item lines="none" class="editor-field">
      <ion-label position="stacked">Number of days</ion-label>
      <ion-input type="number" min="1" max="14" [(ngModel)]="numberOfDays" (ionChange)="updateNumberOfDays()"
        placeholder="1" class="editor-input">
      </ion-input>
    </ion-item>

    <ion-item lines="none" class="editor-field">
      <ion-label position="stacked">Start time</ion-label>
      <ion-input type="time" [(ngModel)]="settings.startTime" (ionChange)="updateAllTimeSlots()" class="editor-input">
      </ion-input>
    </ion-item>

    <ion-item lines="none" class="editor-field">
      <ion-label position="stacked">End time</ion-label>
      <ion-input type="time" [(ngModel)]="settings.endTime" (ionChange)="updateAllTimeSlots()" class="editor-input">
      </ion-input>
    </ion-item>
  </section>

  <div class="editor-days">
    <ion-card *ngFor="let day of editedItinerary; let dayIndex = index" class="editor-day-card">
      <ion-card-header class="editor-day-header">
        <ion-card-title class="editor-day-title">
          Day {{ day.day }}
          <span class="editor-day-date" *ngIf="day.date">{{ formatDateDisplay(day.date) }}</span>
        </ion-card-title>
        <ion-button size="small" fill="clear" color="danger" class="day-clear-btn" (click)="removeAllSpotsFromDay(dayIndex)"
          *ngIf="day.spots.length > 0">
          <ion-icon name="trash-outline" slot="start"></ion-icon>
          Clear all
        </ion-button>
      </ion-card-header>
      <ion-card-content class="editor-day-body">
        <div cdkDropList #dayList="cdkDropList" [cdkDropListData]="day.spots" [cdkDropListConnectedTo]="allLists"
          class="drop-list editor-drop-list" (cdkDropListDropped)="drop($event)">
          <div class="editor-spot-row" *ngFor="let spot of day.spots; let spotIndex = index" cdkDrag>
            <ion-avatar class="editor-spot-avatar">
              <img [src]="spot.img || 'assets/img/default.png'" alt="{{ spot.name }}">
            </ion-avatar>
            <ion-label class="editor-spot-label">
              <h4>{{ spot.name }}</h4>
              <p class="editor-time-slot">{{ spot.timeSlot }}</p>
            </ion-label>
            <div class="editor-spot-actions">
              <ion-input type="number" min="30" max="480" [(ngModel)]="spot.durationMinutes"
                (ionChange)="updateTimeSlots(dayIndex)" placeholder="120" class="duration-input" aria-label="Minutes">
              </ion-input>
              <ion-button size="small" fill="clear" color="danger" (click)="removeSpot(dayIndex, spotIndex)" aria-label="Remove stop">
                <ion-icon name="close-circle-outline"></ion-icon>
              </ion-button>
            </div>
          </div>
          <div *ngIf="day.spots.length === 0" class="editor-empty-drop">
            <ion-icon name="swap-vertical-outline" aria-hidden="true"></ion-icon>
            <p>Drag stops here to reorder</p>
          </div>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
