<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pending tips — Admin</title>
    <link rel="stylesheet" href="/assets/css/admin.css" />
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <script src="/assets/js/firebase-config.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/core.js"></script>
  </head>
  <body class="tc-admin">
    <div class="wrap">
      <nav class="nav tc-topbar">
        <strong>Admin</strong>
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/moderation/pending-spots.html">Pending spots</a>
        <a href="/admin/moderation/pending-tips.html">Pending tips</a>
        <button
          type="button"
          class="secondary"
          style="margin-left: auto"
          id="logout"
          onclick="(window.TC&amp;&amp;window.TC.signOut)?void window.TC.signOut():(location.href='/admin/login.html')"
        >
          Logout
        </button>
      </nav>
      <div class="card">
        <h1>Pending local tips</h1>
        <div class="seg">
          <button type="button" class="small secondary on" data-st="pending">Pending</button>
          <button type="button" class="small secondary" data-st="approved">Approved</button>
          <button type="button" class="small secondary" data-st="rejected">Rejected</button>
        </div>
        <div class="list" id="list"></div>
      </div>
    </div>
    <script>
      let status = 'pending';
      let uid = '';

      async function render() {
        const snap = await firebase
          .firestore()
          .collection('pending_local_tips')
          .where('status', '==', status)
          .get();
        const box = document.getElementById('list');
        box.innerHTML = '';
        snap.forEach((doc) => {
          const t = doc.data();
          const row = document.createElement('div');
          row.className = 'list-item';
          row.style.flexDirection = 'column';
          row.style.alignItems = 'flex-start';
          row.innerHTML =
            '<div><strong>' +
            (t.spotName || t.spotId || '') +
            '</strong></div><div class="muted">' +
            (t.tipText || '') +
            '</div>';
          const act = document.createElement('div');
          act.className = 'row';
          act.style.marginTop = '0.35rem';
          if (status === 'pending') {
            const ap = document.createElement('button');
            ap.className = 'small';
            ap.textContent = 'Approve';
            ap.onclick = async () => {
              const p = (await doc.ref.get()).data();
              if ((p.status || '') !== 'pending') return alert('Not pending');
              const spotId = p.spotId || '';
              if (!spotId) return alert('Missing spotId');
              const notes = prompt('Optional notes') || '';
              const now = firebase.firestore.Timestamp.now();
              const subAt = p.submittedAt || now;
              const subBy = p.submittedBy || '';
              await firebase
                .firestore()
                .collection('tourist_spots')
                .doc(spotId)
                .collection('local_tips')
                .add({
                  tipText: p.tipText || '',
                  submittedBy: subBy,
                  submittedAt: subAt,
                  approvedAt: now,
                  approvedBy: uid,
                  sourcePendingTipId: doc.id,
                });
              const upd = { status: 'approved', reviewedAt: now, reviewedBy: uid };
              if (notes.trim()) upd.reviewNotes = notes.trim();
              await doc.ref.update(upd);
              render();
            };
            const rj = document.createElement('button');
            rj.className = 'small danger';
            rj.textContent = 'Reject';
            rj.onclick = async () => {
              const notes = prompt('Reason (required)') || '';
              if (!notes.trim()) return alert('Notes required');
              await doc.ref.update({
                status: 'rejected',
                reviewNotes: notes.trim(),
                reviewedAt: firebase.firestore.Timestamp.now(),
                reviewedBy: uid,
              });
              render();
            };
            act.append(ap, rj);
          }
          row.appendChild(act);
          box.appendChild(row);
        });
      }

      document.querySelectorAll('[data-st]').forEach((b) => {
        b.onclick = () => {
          document.querySelectorAll('[data-st]').forEach((x) => x.classList.remove('on'));
          b.classList.add('on');
          status = b.getAttribute('data-st') || 'pending';
          render();
        };
      });

      (async function () {
        const u = await TC.requireAdmin();
        if (!u) return;
        uid = u.uid;
        await render();
      })();
    </script>
  </body>
</html>
