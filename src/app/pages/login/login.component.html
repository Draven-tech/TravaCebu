<!-- Full-screen auth check spinner — shown while Firebase resolves the session -->
@if (checking) {
  <div class="tc-login-checking" aria-busy="true" role="status">
    <div class="tc-login-checking-inner">
      <span class="tc-brand-mark" style="margin-bottom: 1rem">TC</span>
      <div class="tc-check-spinner"></div>
      <span class="tc-check-label">Checking session…</span>
    </div>
  </div>
} @else {
  <div class="tc-login-page">
    <div class="tc-login-card">
      <div class="tc-login-logo" aria-hidden="true">
        <span class="tc-login-mark">TC</span>
      </div>
      <div class="tc-login-welcome">
        <h2>TravaCebu Admin</h2>
        <p>Sign in with your admin account.</p>
      </div>

      @if (errorMsg) {
        <p class="tc-login-err tc-login-err-visible" role="alert" aria-live="polite">{{ errorMsg }}</p>
      }

      @if (configOk) {
        <form (submit)="$event.preventDefault(); submit()" method="post" action="#">
          <label>
            Email
            <input type="email" name="email" required autocomplete="username" [(ngModel)]="email" />
          </label>
          <label>
            Password
            <input
              [attr.type]="pwType"
              name="password"
              required
              minlength="6"
              autocomplete="current-password"
              [(ngModel)]="password"
              (keydown.enter)="$event.preventDefault(); submit()"
            />
          </label>
          <button type="button" class="secondary small" style="margin-top: 0.5rem" (click)="togglePw()">
            {{ pwType === 'password' ? 'Show password' : 'Hide password' }}
          </button>
          <button type="button" class="tc-login-submit" (click)="submit()" [disabled]="submitting">
            {{ submitting ? 'Signing in…' : 'Sign in' }}
          </button>
        </form>
      }
    </div>
  </div>
}
