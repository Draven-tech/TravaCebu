<div class="wrap">
  <div class="card">
    <h1>Pending Tourist Spots</h1>

    <div class="seg">
      <button
        type="button"
        class="small secondary"
        [class.on]="status === 'pending'"
        [disabled]="tabPanelLoading"
        (click)="setStatus('pending')"
      >
        Pending
      </button>
      <button
        type="button"
        class="small secondary"
        [class.on]="status === 'approved'"
        [disabled]="tabPanelLoading"
        (click)="setStatus('approved')"
      >
        Approved
      </button>
      <button
        type="button"
        class="small secondary"
        [class.on]="status === 'rejected'"
        [disabled]="tabPanelLoading"
        (click)="setStatus('rejected')"
      >
        Rejected
      </button>
    </div>

    <div class="tc-tab-loading-wrap">
      @if (tabPanelLoading) {
        <div class="tc-tab-loading-overlay" aria-busy="true" role="status">
          <div class="tc-tab-spinner" aria-hidden="true"></div>
          <span class="tc-tab-loading-label">Loading…</span>
          <span class="tc-visually-hidden">Loading list</span>
        </div>
      }
      <div class="list">
        @for (row of rows; track row.id) {
          <div class="list-item" style="flex-direction: row; align-items: flex-start; gap: 1rem; flex-wrap: wrap; padding: 1rem">
            @if (spotImage(row); as src) {
              <img
                [src]="src"
                alt=""
                width="140"
                height="100"
                style="width: 140px; height: 100px; object-fit: cover; border-radius: 6px; flex-shrink: 0; border: 1px solid var(--tc-border)"
                loading="lazy"
              />
            }
            <div style="flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 0.25rem">
              <strong>{{ row.data['name'] || '' }}</strong>
              <span class="muted" style="font-size: 0.8125rem; line-height: 1.5">
                {{ (row.data['description'] || '').toString().slice(0, 280) }}
              </span>
              <div class="row" style="margin-top: 0.5rem; gap: 0.375rem">
                @if (status === 'pending') {
                  <button type="button" class="small" (click)="approve(row)">Approve</button>
                  <button type="button" class="small danger" (click)="reject(row)">Reject</button>
                }
                <button type="button" class="small secondary" (click)="removeRow(row)">Delete</button>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</div>
