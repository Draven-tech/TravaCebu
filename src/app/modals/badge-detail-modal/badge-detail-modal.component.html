<div class="modal-backdrop" (click)="dismiss()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <!-- Close Button -->
    <button class="close-button" (click)="dismiss()">
      <ion-icon name="close"></ion-icon>
    </button>

    <!-- Badge Content -->
    <div class="badge-content">
      <!-- Badge Icon -->
      <div class="badge-icon-section">
        <div class="badge-icon-wrapper" [ngClass]="{'locked': !badge.isUnlocked}">
          <img [src]="getBadgeIcon()" [alt]="badge.title" class="badge-icon" />
        </div>
      </div>

      <!-- Badge Info -->
      <div class="badge-info-section">
        <h2 class="badge-title">{{ badge.title }}</h2>
        
        <!-- Tier Badge -->
        <div class="tier-badge" [style.background-color]="getTierColor()">
          <span class="tier-text">{{ getTierText() }}</span>
        </div>

        <!-- Description -->
        <p class="badge-description">{{ badge.description }}</p>

        <button
          *ngIf="showHistoryEntryButton()"
          type="button"
          class="tier-history-button"
          (click)="toggleTierHistory()"
          [attr.aria-label]="'Achievement history'"
          [attr.aria-expanded]="showTierHistory"
          [attr.title]="'Achievement history'"
        >
          <ion-icon name="time" aria-hidden="true"></ion-icon>
        </button>

        <div class="tier-history-panel" *ngIf="showHistoryEntryButton() && showTierHistory">
          <table class="tier-history-table" *ngIf="badge.tierHistory && badge.tierHistory.length > 0">
            <thead>
              <tr>
                <th scope="col">{{ profileHistoryColumnLabel() }}</th>
                <th class="history-date-header" scope="col">Date achieved</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let row of badge.tierHistory">
                <td>
                  <span class="history-tier" [style.color]="historyRowTierColor(row)">{{
                    tierLabel(row)
                  }}</span>
                </td>
                <td class="history-date-cell">{{ formatTierDate(row.at) }}</td>
              </tr>
            </tbody>
          </table>
          <p
            *ngIf="!badge.tierHistory || badge.tierHistory.length === 0"
            class="empty-tier-history"
          >
            {{ emptyHistoryMessage() }}
          </p>
        </div>

        <!-- Status Message -->
        <div class="status-message" [ngClass]="{'unlocked': badge.isUnlocked, 'locked': !badge.isUnlocked}">
          <ion-icon [name]="badge.isUnlocked ? 'checkmark-circle' : 'lock-closed'"></ion-icon>
          <span>{{ badge.isUnlocked ? 'Badge Unlocked!' : 'Complete requirements to unlock this badge' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
