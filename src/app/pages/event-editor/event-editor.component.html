<div class="wrap">
  <div class="card">
    <h1>Event Editor</h1>
    <div class="row">
      <a class="btn small secondary" routerLink="/admin/events">← Back to Events</a>
      <button type="button" class="small" (click)="openPick()">Pick Tourist Spot</button>
      <button type="button" class="small" (click)="save()">Save</button>
    </div>

    <label>
      Name
      <input type="text" [(ngModel)]="name" name="name" autocomplete="off" />
    </label>

    <label>
      Description
      <textarea [(ngModel)]="desc" name="desc"></textarea>
    </label>

    <div class="row" style="align-items: flex-end; gap: 1rem; margin-top: 0.875rem">
      <label style="margin-top: 0; min-width: 160px">
        Date
        <input type="date" [(ngModel)]="date" name="date" />
      </label>
      <label style="margin-top: 0; min-width: 140px">
        Start time
        <input type="time" [(ngModel)]="time" name="time" />
      </label>
      <label style="margin-top: 0; min-width: 140px">
        End time
        <input type="time" [(ngModel)]="endTime" name="endTime" />
      </label>
    </div>

    <p class="muted" style="margin-top: 0.875rem">
      Linked spot: <strong>{{ spotName || 'none selected' }}</strong>
      @if (spotId) { <code>{{ spotId }}</code> }
    </p>

    <label>
      Image
      <input type="file" accept="image/*" (change)="onFile($event)" />
    </label>
    @if (previewUrl) {
      <img [src]="previewUrl" alt="" style="max-width: 240px; border-radius: 6px; margin-top: 0.5rem; display: block" />
    }
  </div>
</div>

<div class="modal-back" [class.on]="pickOpen" (click)="closePick()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h2 style="margin-top: 0">Select Tourist Spot</h2>
    <label>
      Search
      <input type="text" [(ngModel)]="pickSearch" name="pickSearch" autocomplete="off" />
    </label>
    <div class="list" style="margin-top: 0.75rem; max-height: 300px; overflow: auto">
      @for (s of filteredSpots(); track s.id) {
        <div class="list-item" style="cursor: pointer" (click)="selectSpot(s)">
          <strong>{{ s.name || '' }}</strong>
          <span class="muted" style="margin-left: 0.5rem">{{ s.category || '' }}</span>
        </div>
      }
    </div>
    <div class="row" style="justify-content: flex-end; margin-top: 0.5rem">
      <button type="button" class="secondary" (click)="closePick()">Cancel</button>
    </div>
  </div>
</div>
