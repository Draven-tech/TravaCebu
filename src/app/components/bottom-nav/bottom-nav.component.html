<div class="bottom-nav-shell">
  <nav class="bottom-nav" aria-label="Main">
    <div
      class="bottom-nav__item"
      [class.bottom-nav__item--active]="currentPage === 'user-dashboard'"
      (click)="navigateTo('user-dashboard')"
      role="button"
      tabindex="0"
      aria-label="Home">
      <ion-icon [name]="currentPage === 'user-dashboard' ? 'home' : 'home-outline'"></ion-icon>
    </div>

    <div
      class="bottom-nav__item"
      [class.bottom-nav__item--active]="currentPage === 'bucket-list'"
      (click)="navigateTo('bucket-list')"
      role="button"
      tabindex="0"
      aria-label="Bucket list">
      <ion-icon [name]="currentPage === 'bucket-list' ? 'basket' : 'basket-outline'"></ion-icon>
    </div>

    <div
      class="bottom-nav__item"
      [class.bottom-nav__item--active]="currentPage === 'itinerary-planner'"
      (click)="navigateTo('itinerary-planner')"
      role="button"
      tabindex="0"
      aria-label="Itinerary">
      <ion-icon [name]="currentPage === 'itinerary-planner' ? 'paper-plane' : 'paper-plane-outline'"></ion-icon>
    </div>

    <div
      class="bottom-nav__item"
      [class.bottom-nav__item--active]="currentPage === 'user-map'"
      (click)="navigateTo('user-map')"
      role="button"
      tabindex="0"
      aria-label="Map">
      <ion-icon [name]="currentPage === 'user-map' ? 'map' : 'map-outline'"></ion-icon>
    </div>

    <div
      class="bottom-nav__item"
      [class.bottom-nav__item--active]="currentPage === 'user-calendar'"
      (click)="navigateTo('user-calendar')"
      role="button"
      tabindex="0"
      aria-label="Calendar">
      <ion-icon [name]="currentPage === 'user-calendar' ? 'calendar' : 'calendar-outline'"></ion-icon>
    </div>

    <div
      class="bottom-nav__item"
      [class.bottom-nav__item--active]="currentPage === 'user-profile'"
      (click)="navigateTo('user-profile')"
      role="button"
      tabindex="0"
      aria-label="Profile">
      <ion-icon [name]="currentPage === 'user-profile' ? 'person' : 'person-outline'"></ion-icon>
    </div>
  </nav>
</div>
