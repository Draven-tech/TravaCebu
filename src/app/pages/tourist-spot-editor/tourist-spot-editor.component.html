<div class="wrap">
  <div class="card">
    <h1>Tourist Spot Editor</h1>
    <div class="row">
      <a class="btn small secondary" routerLink="/admin/tourist-spots">← Back to Spots</a>
      <button type="button" class="small" (click)="searchPlaces()">Search Google Places</button>
      <button type="button" class="small" (click)="save()">Save</button>
    </div>

    <div class="row" style="margin-top: 1rem; align-items: flex-end; gap: 1rem">
      <label style="margin-top: 0; min-width: 160px">
        Map tile
        <select [(ngModel)]="tile" name="tile" (change)="onTileChange()">
          <option value="esri">Esri</option>
          <option value="osm">OSM</option>
        </select>
      </label>
      <label style="margin-top: 0; flex: 1; min-width: 180px">
        Name
        <input type="text" [(ngModel)]="name" name="name" autocomplete="off" />
      </label>
      <label style="margin-top: 0; min-width: 160px">
        Category
        <input type="text" [(ngModel)]="category" name="category" placeholder="attraction" />
      </label>
      <label style="margin-top: 0; min-width: 140px">
        Exposure
        <select [(ngModel)]="exposure" name="exposure">
          <option value="">(auto from types)</option>
          <option value="indoor">Indoor</option>
          <option value="mixed">Mixed</option>
          <option value="outdoor">Outdoor</option>
        </select>
      </label>
    </div>

    <label>
      Description
      <textarea [(ngModel)]="desc" name="desc"></textarea>
    </label>

    <label>
      Image file
      <input type="file" accept="image/*" (change)="onFile($event)" />
    </label>
    @if (previewUrl) {
      <img [src]="previewUrl" alt="" style="max-width: 260px; border-radius: 6px; margin-top: 0.5rem; display: block" />
    }

    <div class="map-box" id="map"></div>
  </div>
</div>
